services:
  backend:
    build: ./backend
    container_name: proumind_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - elasticsearch
      - neo4j
      - redis

  postgres:
    image: postgres:16
    container_name: proumind_postgres
    environment:
      POSTGRES_DB: proumind
      POSTGRES_USER: proumind
      POSTGRES_PASSWORD: proumind
    ports:
      - "5432:5432"
    volumes:
      - proumind_postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: proumind_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - proumind_es_data:/usr/share/elasticsearch/data

  neo4j:
    image: neo4j:5
    container_name: proumind_neo4j
    environment:
      NEO4J_AUTH: neo4j/proumind123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - proumind_neo4j_data:/data

  redis:
    image: redis:7
    container_name: proumind_redis
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n
    container_name: proumind_n8n
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: proumind
    volumes:
      - proumind_n8n_data:/home/node/.n8n

  worker:
    build: ./backend
    container_name: proumind_worker
    command: rq worker proumind_ingestion --url redis://redis:6379/0
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres
      - elasticsearch
      - neo4j

volumes:
  proumind_postgres_data:
  proumind_es_data:
  proumind_neo4j_data:
  proumind_n8n_data: